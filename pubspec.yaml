name: lazy_development_kit
description: "A Flutter SDK that wraps Strapi's REST APIs into a simple, type-safe, and intuitive client-side library."
version: 1.0.0
homepage: https://github.com/subhajitkar/lazy_development_kit
repository: https://github.com/subhajitkar/lazy_development_kit
issue_tracker: https://github.com/subhajitkar/lazy_development_kit/issues

environment:
  sdk: '>=2.17.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP Client & Networking
  dio: ^5.4.0
  web_socket_channel: ^2.4.0
  
  # Serialization & Data Handling
  json_annotation: ^4.8.1
  
  # State Management
  rxdart: ^0.27.7
  
  # Security
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3
  
  # File Handling
  mime: ^1.0.4
  
  # Logging
  logger: ^2.0.2+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Code Generation
  json_serializable: ^6.7.1
  build_runner: ^2.4.7
  
  # Testing
  mockito: ^5.4.4
  http_mock_adapter: ^0.6.1
  
  # Code Quality
  very_good_analysis: ^5.1.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
